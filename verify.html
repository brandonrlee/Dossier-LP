<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .otp-input {
    caret-color: #4f378a;
  }
  .otp-input::-webkit-outer-spin-button,
  .otp-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .otp-input { -moz-appearance: textfield; }
  .otp-error {
    border-color: #ba1a1a !important;
    animation: shake 0.4s ease-in-out;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md">

<header class="w-full px-lg py-lg flex justify-between items-center max-w-container-max mx-auto absolute top-0 left-0 right-0">
  <a href="/" class="font-headline-md text-headline-md text-on-surface tracking-tight">
    Dossier <span class="text-on-surface-variant text-body-md font-body-md ml-xs">| by Nozomio Labs</span>
  </a>
  <a href="/" aria-label="Back" class="text-on-surface-variant hover:text-on-surface transition-colors">
    <span class="material-symbols-outlined">close</span>
  </a>
</header>

<main class="flex-grow flex items-center justify-center p-lg mt-xxl md:mt-0">
  <div class="max-w-[480px] w-full text-center flex flex-col gap-xl">

    <div class="flex flex-col gap-sm">
      <h1 class="font-display-lg text-display-lg text-on-surface">enter your code.</h1>
      <p class="font-body-lg text-body-lg text-on-surface-variant">
        sent a 6-digit code to 🇺🇸 +1 480 246 5857
      </p>
    </div>

    <form id="otp-form" class="flex flex-col gap-xl items-center w-full" novalidate>
      <div id="otp-group" class="flex gap-sm justify-center w-full" role="group" aria-label="One-time code">
        <input aria-label="Digit 1" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*" autofocus
          class="otp-input w-12 h-14 sm:w-16 sm:h-16 md:w-[72px] md:h-[72px] text-center font-headline-lg text-headline-lg bg-surface-container-lowest border border-outline-variant text-on-surface rounded-DEFAULT focus:outline-none focus:border-primary focus:border-2 shadow-[0_4px_20px_rgba(26,26,26,0.04)] transition-colors"
          maxlength="1" type="text" />
        <input aria-label="Digit 2" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*"
          class="otp-input w-12 h-14 sm:w-16 sm:h-16 md:w-[72px] md:h-[72px] text-center font-headline-lg text-headline-lg bg-surface-container-lowest border border-outline-variant text-on-surface rounded-DEFAULT focus:outline-none focus:border-primary focus:border-2 shadow-[0_4px_20px_rgba(26,26,26,0.04)] transition-colors"
          maxlength="1" type="text" />
        <input aria-label="Digit 3" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*"
          class="otp-input w-12 h-14 sm:w-16 sm:h-16 md:w-[72px] md:h-[72px] text-center font-headline-lg text-headline-lg bg-surface-container-lowest border border-outline-variant text-on-surface rounded-DEFAULT focus:outline-none focus:border-primary focus:border-2 shadow-[0_4px_20px_rgba(26,26,26,0.04)] transition-colors"
          maxlength="1" type="text" />
        <input aria-label="Digit 4" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*"
          class="otp-input w-12 h-14 sm:w-16 sm:h-16 md:w-[72px] md:h-[72px] text-center font-headline-lg text-headline-lg bg-surface-container-lowest border border-outline-variant text-on-surface rounded-DEFAULT focus:outline-none focus:border-primary focus:border-2 shadow-[0_4px_20px_rgba(26,26,26,0.04)] transition-colors"
          maxlength="1" type="text" />
        <input aria-label="Digit 5" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*"
          class="otp-input w-12 h-14 sm:w-16 sm:h-16 md:w-[72px] md:h-[72px] text-center font-headline-lg text-headline-lg bg-surface-container-lowest border border-outline-variant text-on-surface rounded-DEFAULT focus:outline-none focus:border-primary focus:border-2 shadow-[0_4px_20px_rgba(26,26,26,0.04)] transition-colors"
          maxlength="1" type="text" />
        <input aria-label="Digit 6" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*"
          class="otp-input w-12 h-14 sm:w-16 sm:h-16 md:w-[72px] md:h-[72px] text-center font-headline-lg text-headline-lg bg-surface-container-lowest border border-outline-variant text-on-surface rounded-DEFAULT focus:outline-none focus:border-primary focus:border-2 shadow-[0_4px_20px_rgba(26,26,26,0.04)] transition-colors"
          maxlength="1" type="text" />
      </div>

      <p id="otp-status" class="text-label-sm font-label-sm text-error h-0 opacity-0 transition-opacity" role="status" aria-live="polite"></p>

      <button type="button" id="resend-btn"
        class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors border-b border-transparent hover:border-primary pb-xs disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:text-on-surface-variant disabled:hover:border-transparent">
        didn't get it? <span id="resend-label">try again</span>
      </button>
    </form>
  </div>
</main>

<script>
  (function () {
    const group = document.getElementById('otp-group');
    const inputs = Array.from(group.querySelectorAll('input'));
    const status = document.getElementById('otp-status');
    const form = document.getElementById('otp-form');
    const resendBtn = document.getElementById('resend-btn');
    const resendLabel = document.getElementById('resend-label');

    const sanitize = (v) => v.replace(/\D/g, '');

    function setError(msg) {
      status.textContent = msg || '';
      status.classList.toggle('opacity-0', !msg);
      status.classList.toggle('h-0', !msg);
      inputs.forEach(i => i.classList.toggle('otp-error', !!msg));
    }

    function clearError() { setError(''); }

    function focusIndex(i) {
      const idx = Math.max(0, Math.min(inputs.length - 1, i));
      inputs[idx].focus();
      inputs[idx].select();
    }

    function tryComplete() {
      const code = inputs.map(i => i.value).join('');
      if (code.length === 6) {
        // Demo-only: accept 000000 or any 6-digit code; show success state.
        clearError();
        inputs.forEach(i => {
          i.classList.remove('border-outline-variant');
          i.classList.add('border-primary', 'border-2');
          i.disabled = true;
        });
        // Replace this with real verification flow.
        console.log('OTP submitted:', code);
      }
    }

    inputs.forEach((input, idx) => {
      input.addEventListener('input', (e) => {
        clearError();
        const cleaned = sanitize(e.target.value);
        if (!cleaned) { e.target.value = ''; return; }

        // Single character path
        if (cleaned.length === 1) {
          e.target.value = cleaned;
          if (idx < inputs.length - 1) focusIndex(idx + 1);
          tryComplete();
          return;
        }

        // Multi-character (e.g. paste fallback through input event)
        const chars = cleaned.split('').slice(0, inputs.length - idx);
        chars.forEach((c, j) => { inputs[idx + j].value = c; });
        const next = Math.min(idx + chars.length, inputs.length - 1);
        focusIndex(next);
        tryComplete();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
          if (input.value) {
            input.value = '';
            clearError();
          } else if (idx > 0) {
            focusIndex(idx - 1);
            inputs[idx - 1].value = '';
          }
          e.preventDefault();
        } else if (e.key === 'ArrowLeft' && idx > 0) {
          focusIndex(idx - 1);
          e.preventDefault();
        } else if (e.key === 'ArrowRight' && idx < inputs.length - 1) {
          focusIndex(idx + 1);
          e.preventDefault();
        } else if (e.key === 'Enter') {
          e.preventDefault();
          tryComplete();
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = sanitize((e.clipboardData || window.clipboardData).getData('text'));
        if (!text) return;
        const chars = text.split('').slice(0, inputs.length);
        inputs.forEach((inp, i) => { inp.value = chars[i] || ''; });
        focusIndex(Math.min(chars.length, inputs.length - 1));
        tryComplete();
      });

      input.addEventListener('focus', () => input.select());
    });

    let cooldown = 0;
    let timer = null;

    function startCooldown(seconds) {
      cooldown = seconds;
      resendBtn.disabled = true;
      resendLabel.textContent = `resend in ${cooldown}s`;
      timer = setInterval(() => {
        cooldown -= 1;
        if (cooldown <= 0) {
          clearInterval(timer);
          resendBtn.disabled = false;
          resendLabel.textContent = 'try again';
        } else {
          resendLabel.textContent = `resend in ${cooldown}s`;
        }
      }, 1000);
    }

    resendBtn.addEventListener('click', () => {
      if (resendBtn.disabled) return;
      inputs.forEach(i => { i.value = ''; i.disabled = false; });
      clearError();
      focusIndex(0);
      // Trigger real resend here.
      startCooldown(30);
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      tryComplete();
    });
  })();
</script>
</body>
</html>
